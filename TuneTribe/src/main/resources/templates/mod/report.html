<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Form</title>
    <link rel="stylesheet" href="styleReport.css">
</head>
<style> /* Basic Reset */
    body, h1, form, button, input, textarea {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f9f9f9;
        color: #333;
        line-height: 1.6;
        padding: 20px;
    }
    
    .container {
        max-width: 800px; /* Adjust width of the container */
        margin: 20px auto; /* Centers the container */
        padding: 20px; /* Padding inside the container */
        background: #fff; /* White background for the container */
        border: 1px solid #ddd; /* Grey border around the container */
        border-radius: 8px; /* Rounded corners for the container */
        box-shadow: 0 2px 5px rgba(0,0,0,0.1); /* Subtle shadow for depth */
    }
    
    .form-layout .form-row {
        margin-bottom: 20px; /* Space between form rows */
    }
    
    label {
        display: block; /* Ensure labels are on their own line */
        margin-bottom: 5px; /* Space between label and input */
    }
    
    input[type="text"], textarea {
        width: 100%; /* Full width inputs and textareas */
        padding: 8px; /* Padding inside inputs and textareas */
        margin-bottom: 10px; /* Space below inputs and textareas */
        border: 1px solid #ccc; /* Grey border around inputs and textareas */
        border-radius: 4px; /* Rounded corners for inputs and textareas */
    }
    
    textarea {
        height: 100px; /* Fixed height for textarea */
    }
    
    .form-actions {
        text-align: center; /* Center align the form actions */
        padding-top: 20px; /* Space above the buttons */
    }
    
    button {
        padding: 10px 20px; /* Padding inside buttons */
        margin-right: 10px; /* Space between buttons */
        background-color: #4CAF50; /* Green background for buttons */
        color: white; /* White text color for buttons */
        border: none; /* No border for buttons */
        border-radius: 4px; /* Rounded corners for buttons */
        cursor: pointer; /* Pointer cursor on hover */
    }
    
    button:hover {
        background-color: #45a049; /* Darker green background on hover */
    }
    
    /* Responsive adjustments */
    @media (max-width: 768px) {
        .container {
            width: 90%; /* More responsive width on smaller screens */
            padding: 10px; /* Less padding on smaller screens */
        }
    
        .form-actions {
            padding-top: 10px; /* Less space above buttons on smaller screens */
        }
    }
    
    footer {
        text-align: center;
        padding: 20px 10px;
        background-color: #f0f0f0; /* Light gray background */
        color: #666; /* Darker gray text color */
        border-top: 1px solid #ddd; /* A subtle border line at the top of the footer */
        position: absolute;
        left: 0;
        bottom: 0;
        width: 100%;
    }
    
    footer p {
        margin: 0; /* Removes default margin */
        font-size: 14px;
    }
    </style>
<body>
    <div class="container">
        <h1>Report Form</h1>
        <form id="reportForm" class="form-layout" action="/post/createreport">
            
            <div class="form-row">
                <label for="postId">PostId: </label>
                <input readonly type="display" id="postId" name="postId" th:value="${post.postId}">
            </div>
            
            <div class="form-row">
                <label for="userName">Your Username:</label>
                <input readonly type="display" id="userName" name="userName" th:value="${reporter.userName}">
            </div>

            <div class="form-row">
                <label for="reportedUser">User Being Reported:</label>
                <input readonly type="display" id="reportedUser" name="reportedUser" th:value="${reported.userName}">
            </div>

            <div class="form-row">
                <label for="explanation">Explanation:</label>
                <textarea id="explanation" name="explanation" required></textarea>
            </div>

            <div class="form-actions">
                <button type="submit">Submit Report</button>
                <button type="button" onclick="window.location.href='/'">Cancel</button>
            </div>
        </form>
    </div>

    
    <footer>
        <p>© TuneTribe 2024</p>
    </footer>
</body>
</html>
