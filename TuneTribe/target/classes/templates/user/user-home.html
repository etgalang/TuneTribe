<html lang="en"
        xmlns="http://www.w3.org/1999/xhtml"
        xmlns:th="http://www.thymeleaf.org"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
    <head>  
        
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Tune Tribe</title>
        
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    </head>
    <body>
        
        <!-- Navbar START -->
        <nav class ="navbar navbar-light bg-primary">
            
            <a 
                href="#"
                class="navbar-brand mb-O h1">
                    <img src="..static/images/TTLogo.png"
                         width="75" height="75" th:src="@{images/TTlogo.png}" />
                    <h3>TuneTribe</h3>
            </a>
            
        </nav>
        <!-- Navbar END -->

        <h5>
            <p>Welcome to TuneTribe</p>
            <p th:text="${currentUser}"></p>
            <!--<a th:href="@{/user/id={id}(id=${user.id})}" th:text=" ${user.id}" > </a>-->
            <p>Lets go to your <a th:href="@{/user/myProfile={username}(username=${currentUser})}">profile page</a></p>
        </h5>

        <!-- Bootstrap POST LIST START -->

        <div class="container">

            <h1 style="text-align:center;">Post List</h1>

            <div style="align-content: center;">
                <p class="my-5">
                    <!--<a href="/post/newpost class="btn btn-primary" >Create Post</a>-->
                </p>

                <table class="table table-bordered">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>userId</th>
                            <th>caption</th>
                            <th>postDate</th>
                            <th>songId</th>
                            <th>likeCount</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="post : ${postList}">
                            <td> <a th:href="@{/post/id={id}(id=${post.postId})}" th:text=" ${post.postId}" > </a></td>                           
                            <td th:text=" ${post.userId}"></td>
                            <td th:text=" ${post.caption}"></td>
                            <td th:text=" ${post.PostDate}"></td>
                            <td th:text=" ${post.songId}"></td>
                            <td th:text=" ${post.likeCount}"></td>
                        </tr>

                    </tbody>
                </table>
                
            </div>


        </div>

        <!--POST LIST END-->
        
        
        
        
        
        
        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    </body>
</html>
