<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Form</title>
    <link rel="stylesheet" href="styleMod.css">
</head>
<body>
    <div class="container">
        <h1>Report Form</h1>
        <form id="reportForm">
            <label for="userName">Your Name:</label>
            <input type="text" id="userName" name="userName" required>

            <label for="reportedUser">User You Are Reporting:</label>
            <input type="text" id="reportedUser" name="reportedUser" required>

            <label for="explanation">Explanation:</label>
            <textarea id="explanation" name="explanation" required></textarea>

            <div>
                <label>Check all that apply:</label>
                <label><input type="checkbox" name="reportType" value="Post"> Post</label>
                <label><input type="checkbox" name="reportType" value="Profile"> Profile</label>
                <label><input type="checkbox" name="reportType" value="Song"> Song</label>
                <label><input type="checkbox" name="reportType" value="Other"> Other</label>
            </div>

            <button type="submit">Submit Report</button>
        </form>
    </div>


    <script>
        document.getElementById("reportForm").onsubmit = function(event) {
            event.preventDefault();
            const formData = new FormData(this);
            fetch('/submit-report', {
                method: 'POST',
                body: new URLSearchParams(formData)
            }).then(response => response.json())
              .then(data => alert(data.message))
              .catch(error => alert('Error submitting report.'));
        };
    </script>
</body>
<style>
    /* Basic Reset */
body, h1, form, button, input, textarea {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f9f9f9;
    color: #333;
    line-height: 1.6;
    padding: 20px;
}

.container {
    max-width: 600px;
    margin: 20px auto;
    padding: 20px;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

h1 {
    font-size: 24px;
    color: #333;
    text-align: center;
    padding-bottom: 20px;
}

label {
    font-weight: bold;
    margin: 10px 0 5px;
}

input[type="text"], textarea {
    width: calc(100% - 22px);
    padding: 10px;
    margin-top: 5px;
    border: 1px solid #ccc;
    border-radius: 4px;
}

input[type="checkbox"] {
    margin-right: 10px;
}

button {
    width: 100%;
    padding: 10px;
    background-color: #5c67f2;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
    text-transform: uppercase;
}

button:hover {
    background-color: #5058e5;
}

/* Responsive adjustments */
@media (max-width: 768px) {
    .container {
        width: 90%;
        margin: 10px auto;
    }
}

</style>
</html>
