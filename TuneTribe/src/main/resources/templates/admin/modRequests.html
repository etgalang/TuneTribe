<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>User List</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css"
              integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous" />
        <script src="../datatable.js"></script>
        <style>
            .active {
                color: green;
            }

            .inactive {
                color: red;
            }
        
        body {
            background-color: #F8F2DC;
        }

        .sidenav {
            height: 100%;
            width: 200px;
            position: fixed;
           
            background-color: #DEA47E;
            padding-top: 20px;
        }

        .sidenav a {
            padding: 8px 8px 8px 32px;
            text-decoration: none;
            font-size: 18px;
            color: white;
            display: block;
            transition: 0.3s;
        }

        .sidenav a:hover {
            background-color: #ddd;
            color: black;
        }

        .active {
            background-color: #2196F3;
            color: white;
        }

        
        @media screen and (max-height: 450px) {
            .sidenav {
                padding-top: 15px;
            }

            .sidenav a {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
 <!-- Navbar START -->
 <nav class="navbar navbar-expand-lg navbar-light" style="background-color: #DEA47E;">
    <a style="color:black; font-weight: bold; font-size: 20px;" th:href="@{/admin/home}">Admin</a>
    
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav mr-auto">
            <li class="nav-item">
                <a class="nav-link" href="/user/user-home" style="color: black;">Tune Tribe</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/user/tunetribe-guidelines" style="color: black;">Community Guidelines</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/user/tunetribe-service" style="color: black;">Terms Of Service</a>
            </li>
        </ul>
        <!-- Logout Button -->
        <form class="form-inline" th:action="@{/logout}" method="post">
            <button class="btn btn-outline-light my-2 my-sm-0" type="submit"  style="background-color: #F8F2DC; border: none; outline: none; color: black;">Log Out</button>
        </form>
    </div>
</nav>

<script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha384-KyZXEAg3QhqLMpG8r+Knujsl5/7M2+E1mBE4y5gRV5vNcF+2Y0Z4p+pqz3V9vZI6" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
<!-- Navbar END -->

<div class="container">
    <h1 style="text-align:center;">Mod Report</h1>
    <div>
        <input class="form-control" id="table-search" type="text" placeholder="Search...">
    </div>
    <div class="table-responsive" style="background-color: white">
        <table class="table table-bordered" id="datatable">
            <thead>
                <tr>
                    <th>ID</th>      
                    <th>Post ID</th>
                    <th>Explanation</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="modReport: ${modReportList}" th:style="${modReport.banned} ? 'color: red;' : 'color: green;'">
                    <td><a th:text="${modReport.id}">View Profile</a></td>
                    <td th:text="${modReport.postId}"></td>
                    <td th:text="${modReport.modExplanation}"></td>
                    <td>
                        <form th:action="@{/admin/modRequest/{id}/toggle-ban(id=${modReport.id})}" method="post">
                            <button class="btn" type="submit" th:text="${modReport.banned ? 'Unban' : 'Ban'}">Toggle Ban</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

   <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js" integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js" integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy" crossorigin="anonymous"></script>

    </body>


</html>
