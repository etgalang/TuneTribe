<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Form</title>
    <link rel="stylesheet" href="styleReport.css">
</head>
<body>
    <div class="container">
        <h1>Report Form</h1>
        <form id="reportForm" class="form-layout">
            <div class="form-row">
                <label for="userName">Your Username:</label>
                <input type="text" id="userName" name="userName" required>
            </div>

            <div class="form-row">
                <label for="reportedUser">User Being Reported:</label>
                <input type="text" id="reportedUser" name="reportedUser" required>
            </div>

            <div class="form-row">
                <label for="explanation">Explanation:</label>
                <textarea id="explanation" name="explanation" required></textarea>
            </div>

            <div class="form-actions">
                <button type="submit">Submit Report</button>
                <button type="button" onclick="window.location.href='/'">Cancel</button>
            </div>
        </form>
    </div>

    <script>
        document.getElementById("reportForm").onsubmit = function(event) {
            event.preventDefault();
            const formData = new FormData(this);
            fetch('/submit-report', {
                method: 'POST',
                body: new URLSearchParams(formData)
            }).then(response => response.json())
              .then(data => alert(data.message))
              .catch(error => alert('Error submitting report.'));
        };
    </script>
    <footer>
        <p>© TuneTribe 2024</p>
    </footer>
</body>
</html>
