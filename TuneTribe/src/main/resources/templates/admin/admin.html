<!DOCTYPE html>
<html lang="en">
<head>

    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css"

        }

    </style>
</head>
<body>
<!-- Side Navbar -->

  <!-- Navbar START -->
  <nav class="navbar navbar-expand-lg navbar-light" style="background-color: #DEA47E;">
    <a style="color:black; font-weight: bold; font-size: 20px;" th:href="@{/admin/home}">Admin</a>
    
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav mr-auto">
            <li class="nav-item">
                <a class="nav-link" href="/user/user-home" style="color: black;">Tune Tribe</a>
            </li>

                <a class="nav-link" href="/tunetribe-guidelines" style="color: black;">Community Guidelines</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/tunetribe-service" style="color: black;">Terms Of Service</a>
            </li>
        </ul>
        <!-- Logout Button -->
        <form class="form-inline" th:action="@{/logout}" method="post">
            <button class="btn btn-outline-light my-2 my-sm-0" type="submit"  style="background-color: #F8F2DC; border: none; outline: none; color: black;">Log Out</button>

    </div>
</nav>

<script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha384-KyZXEAg3QhqLMpG8r+Knujsl5/7M2+E1mBE4y5gRV5vNcF+2Y0Z4p+pqz3V9vZI6" crossorigin="anonymous"></script>

<!-- Main Content -->
    <!-- Row 2: Card Sections -->
    <div class="container" >
          <h3 style="text-align:center; margin-bottom: 50px;">Admin Dashboard</h3>

    <!-- Row 1: Total Users -->
  <div class="row justify-content-center" style="padding-bottom: 20px;">
    <div class="col-md-4">
        <div class="card" style="background-color: #DEA47E;">
            <div class="card-body">
                <h5 class="card-title">Total Users and Artists: [[${totalUsers}]]</h5>
            </div>
        </div>
    </div>
   
</div>
        <div class="row" style="padding-bottom: 20px;">
            <!-- User List -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">User List</h5>
                        <a href="/admin/user" class="btn card-link" style="background-color: #F8F2DC; color:black;">View</a>
                    </div>
                </div>
            </div>
            <!-- Artist List -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Artist List</h5>
                        <a href="/admin/artist" class="btn card-link" style="background-color: #F8F2DC; color:black;">View</a>
                    </div>
                </div>
            </div>
            <!-- Mod List -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Mod List</h5>
                        <a href="/admin/moderator" class="btn  card-link" style="background-color: #F8F2DC; color:black;">View</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Row 3: Additional Sections -->
        <div class="row" style="padding-bottom: 20px;">
            <!-- Mod Requests -->
                        <!-- Community Guidelines -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Community Guidelines</h5>
                        <a href="/admin/community-guidelines" class="btn card-link" style="background-color: #F8F2DC; color:black;">View</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Terms of Service</h5>
                        <a href="/admin/terms-service" class="btn card-link" style="background-color: #F8F2DC; color:black;">View</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"
